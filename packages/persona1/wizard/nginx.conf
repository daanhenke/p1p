# Static SPA for the Persona 1 setup wizard. Long-cache the fingerprinted /assets bundle and the
# immutable patch packs / music; never cache index.html so new deploys are picked up immediately.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/css application/javascript application/json application/octet-stream image/svg+xml;

    # hashed bundle assets are immutable
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # compiled patch packs and music are content-stable per release
    location /patches/ { expires 7d; add_header Cache-Control "public"; try_files $uri =404; }
    location /ost/ { expires 7d; add_header Cache-Control "public"; try_files $uri =404; }

    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # single page — fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    add_header X-Content-Type-Options "nosniff" always;
}
